<!DOCTYPE html>
<html>

<head>
<title>Recent Searches</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

.hero{
display:flex;
flex-direction:column;
align-items:center;
margin-top:140px;
gap:40px;
}

.title{
font-size:64px;
letter-spacing:6px;
color:#00ff9c;
text-shadow:0 0 25px #00ff9c,0 0 40px #00ff9c;
}

.recent-container{
display:flex;
flex-direction:column;
gap:15px;
width:90%;
max-width:420px;
margin-top:40px;
}

.runner-box{
background:rgba(11,15,20,.85);
border-radius:12px;
padding:16px 22px;
color:#00ff9c;
font-weight:800;
text-align:center;
font-size:16px;
box-shadow:0 0 20px rgba(0,255,156,.3);
cursor:pointer;
transition:.2s;
}

.runner-box:hover{
transform:translateY(-3px);
box-shadow:0 0 25px #00ff9c;
}

.no-runners{
background:rgba(30,0,0,.85);
border-radius:12px;
padding:16px 22px;
color:#ff4d4d;
font-weight:800;
text-align:center;
box-shadow:0 0 15px rgba(255,77,77,.4);
}

.footer{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
font-size:12px;
opacity:.5;
}

</style>

</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="nav">

<a href="/" title="Home">

<!-- SAME PROFESSIONAL ICON -->
<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
<path stroke-linecap="round" stroke-linejoin="round" d="M3 10.75L12 4l9 6.75M5 10v9h14v-9"/>
</svg>

</a>

</div>

<div class="hero">

<div class="title">Recently Searched</div>

<div class="recent-container" id="recentContainer"></div>

</div>

<div class="footer">
Not affiliated with Bungie.
</div>

<script src="app.js"></script>

<script>

let recentRunners=[];

const container=document.getElementById("recentContainer");

function renderRecentRunners(){

container.innerHTML='';

if(recentRunners.length===0){

const noRunners=document.createElement('div');
noRunners.className='no-runners';
noRunners.textContent="No recent searches";

container.appendChild(noRunners);

}else{

recentRunners.forEach(runner=>{

const box=document.createElement('div');
box.className='runner-box';
box.textContent=runner;

box.onclick=()=>{
window.location.href=`player.html?name=${runner}`;
};

container.appendChild(box);

});

}

}

renderRecentRunners();

</script>

</body>
</html>
