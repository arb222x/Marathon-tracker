<!DOCTYPE html>
<html>

<head>
<title>Recent Searches</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
color:white;
}

/* NAV */

.nav{
position:absolute;
top:30px;
left:40px;
display:flex;
align-items:center;
gap:25px;
z-index:5;
}

.nav a{
display:flex;
align-items:center;
gap:8px;
text-decoration:none;
color:white;
font-size:14px;
letter-spacing:1px;
}

.nav a:hover{
color:#00ff9c;
}

/* HOME ICON FIX */

.home-icon{
width:26px;
height:26px;
stroke:white;
fill:none;
stroke-width:2;
transition:.2s;
}

.nav a:hover .home-icon{
stroke:#00ff9c;
filter:drop-shadow(0 0 6px #00ff9c);
}

/* HERO */

.hero{
display:flex;
flex-direction:column;
align-items:center;
margin-top:160px;
}

.title{
font-size:60px;
letter-spacing:6px;
color:#00ff9c;
text-shadow:0 0 30px #00ff9c;
}

/* RECENT CONTAINER */

.recent-container{
margin-top:50px;
display:flex;
flex-direction:column;
gap:15px;
width:350px;
}

/* RUNNER BOX */

.runner-box{
background:#0b0f14;
padding:15px;
border-radius:10px;
text-align:center;
cursor:pointer;
box-shadow:0 0 20px rgba(0,255,156,.25);
color:#00ff9c;
font-weight:800;
}

.runner-box:hover{
box-shadow:0 0 25px #00ff9c;
}

/* EMPTY */

.no-runners{
background:#220000;
padding:15px;
border-radius:10px;
text-align:center;
color:#ff4d4d;
}

/* CLEAR BUTTON */

.clear-btn{
margin-top:20px;
background:#111;
border:1px solid #444;
color:#aaa;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
font-family:'Orbitron',sans-serif;
}

.clear-btn:hover{
border-color:#ff4d4d;
color:#ff4d4d;
}

/* FOOTER */

.footer{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
font-size:12px;
opacity:.5;
}

</style>

</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<!-- NAV -->

<div class="nav">

<a href="/">

<svg class="home-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
<path d="M3 11L12 4l9 7"/>
<path d="M5 10v10h14V10"/>
</svg>

</a>

<a href="/recent.html">Recent Runners</a>

</div>

<div class="hero">

<div class="title">Recently Searched</div>

<div class="recent-container" id="recentContainer"></div>

<button class="clear-btn" onclick="clearRecent()">Clear Recent</button>

</div>

<div class="footer">
Not affiliated with Bungie.
</div>

<script>

const container=document.getElementById("recentContainer");

function renderRecent(){

container.innerHTML="";

let recent=JSON.parse(localStorage.getItem("recentRunners"))||[];

if(recent.length===0){

const empty=document.createElement("div");
empty.className="no-runners";
empty.textContent="No recent searches";

container.appendChild(empty);

return;
}

recent.forEach(name=>{

const box=document.createElement("div");
box.className="runner-box";
box.textContent=name;

box.onclick=()=>{
window.location.href=`player.html?name=${name}`;
};

container.appendChild(box);

});

}

function clearRecent(){

localStorage.removeItem("recentRunners");

renderRecent();

}

renderRecent();

</script>

</body>
</html>
