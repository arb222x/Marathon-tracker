<!DOCTYPE html>
<html>

<head>
<title>Recent Searches</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

/* HERO SECTION */
.hero{
display:flex;
flex-direction:column;
align-items:center;
margin-top:140px;
gap:40px;
position:relative;
}

.title{
font-size:64px;
letter-spacing:6px;
color:#00ff9c;
text-shadow:0 0 25px #00ff9c,0 0 40px #00ff9c;
text-align:center;
}

/* RECENT RUNNERS CONTAINER */
.recent-container{
display:flex;
flex-direction:column;
gap:15px;
width:90%;
max-width:420px;
margin-top:40px; /* lowered from title */
}

/* RUNNER BOX */
.runner-box{
background:rgba(11,15,20,.85);
border-radius:12px;
padding:16px 22px;
color:#00ff9c;
font-weight:800;
text-align:center;
font-size:16px;
box-shadow:0 0 20px rgba(0,255,156,.3);
cursor:pointer;
transition:transform .2s,box-shadow .2s;
}

.runner-box:hover{
transform:translateY(-3px);
box-shadow:0 0 25px #00ff9c,inset 0 0 10px rgba(0,255,156,.2);
}

/* NO SEARCHES BOX */
.no-runners{
background:rgba(30,0,0,.85);
border-radius:12px;
padding:16px 22px;
color:#ff4d4d;
font-weight:800;
text-align:center;
font-size:16px;
box-shadow:0 0 15px rgba(255,77,77,.4);
animation:pulseRed 1.5s infinite alternate;
}

@keyframes pulseRed{
from{box-shadow:0 0 15px rgba(255,77,77,.3);}
to{box-shadow:0 0 25px rgba(255,77,77,.6);}
}

/* FOOTER FIXED */
.footer{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
font-size:12px;
opacity:.5;
}

.footer:hover{
opacity:.9;
text-shadow:0 0 10px #00ff9c;
}

</style>

</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<!-- NAVBAR -->
<div class="nav">

<a href="/" title="Home">
<svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="white" viewBox="0 0 24 24">
<path d="M12 3l9 8h-3v10h-5v-6H11v6H6V11H3z"/>
</svg>
</a>

</div>

<!-- HERO -->
<div class="hero">

<div class="title">Recently Searched</div>

<div class="recent-container" id="recentContainer">
</div>

</div>

<div class="footer">
Not affiliated with Bungie.
</div>

<script src="app.js"></script>

<script>

let recentRunners=[];

const container=document.getElementById("recentContainer");

function renderRecentRunners(){

container.innerHTML='';

if(recentRunners.length===0){

const noRunners=document.createElement('div');
noRunners.className='no-runners';
noRunners.textContent="No recent searches";

container.appendChild(noRunners);

}else{

recentRunners.forEach(runner=>{

const runnerBox=document.createElement('div');
runnerBox.className='runner-box';
runnerBox.textContent=runner;

runnerBox.onclick=()=>{
window.location.href=`player.html?name=${runner}`;
};

container.appendChild(runnerBox);

});

}

}

renderRecentRunners();

</script>

</body>
</html>
