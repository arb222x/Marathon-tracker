<!DOCTYPE html>
<html>

<head>
  <title>Recent Searches</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</div>
</div>
</div>
</div>
  <style>
    /* HERO SECTION */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 120px;
      gap: 25px;
      z-index: 1;
      position: relative;
    }

    .title {
      font-size: 64px;
      letter-spacing: 6px;
      color: #00ff9c;
      text-shadow: 0 0 25px #00ff9c, 0 0 40px #00ff9c;
      text-align: center;
      margin-bottom: 20px;
    }

    /* RECENT RUNNERS CONTAINER */
    .recent-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 90%;
      max-width: 400px;
    }

    /* INDIVIDUAL RUNNER BOX */
    .runner-box {
      background: rgba(11, 15, 20, 0.85);
      border-radius: 12px;
      padding: 15px 20px;
      color: #00ff9c;
      font-weight: 800;
      text-align: center;
      font-size: 16px;
      box-shadow: 0 0 20px rgba(0, 255, 156, 0.3);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .runner-box:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 25px #00ff9c, inset 0 0 10px rgba(0, 255, 156, 0.2);
    }

    /* EMPTY STATE */
    .no-runners {
      background: rgba(30, 0, 0, 0.85);
      border-radius: 12px;
      padding: 15px 20px;
      color: #ff4d4d;
      font-weight: 800;
      text-align: center;
      font-size: 16px;
      box-shadow: 0 0 15px rgba(255, 77, 77, 0.4);
      animation: pulseRed 1.5s infinite alternate;
    }

    @keyframes pulseRed {
      from {
        box-shadow: 0 0 15px rgba(255, 77, 77, 0.3);
      }

      to {
        box-shadow: 0 0 25px rgba(255, 77, 77, 0.6);
      }
    }
  </style>
</head>

<body>

  <div class="background"></div>
  <div class="overlay"></div>

  <!-- NAVIGATION -->
  <div class="nav">
    <a href="/">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
        <path d="M12 3l10 9h-3v9h-6v-6h-2v6H5v-9H2z" />
      </svg>
      Home
    </a>
  </div>

  <!-- HERO SECTION -->
  <div class="hero">
    <div class="title">Recently searched</div>

    <div class="recent-container" id="recentContainer">
      <!-- Runner boxes will populate here -->
    </div>
  </div>
  </div>
  </div>
  </div>
  </div>
  </div>
  </div>
  </div>
  
  <div class="footer">
    Not affiliated with Bungie.
  </div>

  <script src="app.js"></script>
  <script>
    // Example recent runners array
    let recentRunners = []; // Start empty to show "No recent searches"

    const container = document.getElementById("recentContainer");

    function renderRecentRunners() {
      container.innerHTML = '';
      if (recentRunners.length === 0) {
        const noRunners = document.createElement('div');
        noRunners.className = 'no-runners';
        noRunners.textContent = "No recent searches";
        container.appendChild(noRunners);
      } else {
        recentRunners.forEach(runner => {
          const runnerBox = document.createElement('div');
          runnerBox.className = 'runner-box';
          runnerBox.textContent = runner;
          runnerBox.onclick = () => {
            // Navigate to player page (replace with actual logic)
            window.location.href = `player.html?name=${runner}`;
          };
          container.appendChild(runnerBox);
        });
      }
    }

    renderRecentRunners();
  </script>

</body>
</html>
