<!DOCTYPE html>
<html>

<head>
<title>Recent Searches</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
color:white;
}

/* NAV */
.nav{
position:absolute;
top:30px;
left:40px;
}

.home-btn{
position:relative;
display:flex;
align-items:center;
}

.home-btn svg{
width:32px;
height:32px;
stroke:white;
transition:.25s;
}

.home-btn:hover svg{
stroke:#00ff9c;
filter:drop-shadow(0 0 8px #00ff9c);
}

/* TOOLTIP */
.home-btn::after{
content:"Home";
position:absolute;
top:42px;
left:50%;
transform:translateX(-50%);
background:#0b0f14;
color:#00ff9c;
font-size:12px;
padding:4px 8px;
border-radius:6px;
opacity:0;
transition:.2s;
white-space:nowrap;
}

.home-btn:hover::after{
opacity:1;
}

/* HERO */
.hero{
display:flex;
flex-direction:column;
align-items:center;
margin-top:150px;
}

.title{
font-size:60px;
letter-spacing:6px;
color:#00ff9c;
text-shadow:0 0 30px #00ff9c;
}

.recent-container{
margin-top:60px;
display:flex;
flex-direction:column;
gap:15px;
width:350px;
}

.runner-box{
background:#0b0f14;
padding:15px;
border-radius:10px;
text-align:center;
cursor:pointer;
box-shadow:0 0 20px rgba(0,255,156,.2);
color:#00ff9c;
font-weight:800;
}

.runner-box:hover{
box-shadow:0 0 25px #00ff9c;
}

.no-runners{
background:#220000;
padding:15px;
border-radius:10px;
text-align:center;
color:#ff4d4d;
}

.footer{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
font-size:12px;
opacity:.5;
}

</style>

</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="nav">
<a href="/" class="home-btn">

<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2">
<path stroke-linecap="round" stroke-linejoin="round"
d="M3 10.75L12 4l9 6.75M5 10v9h14v-9"/>

</svg>

</a>
</div>

<div class="hero">

<div class="title">Recently Searched</div>

<div class="recent-container" id="recentContainer"></div>

</div>

<div class="footer">
Not affiliated with Bungie.
</div>

<script>

const container=document.getElementById("recentContainer");

let recent=JSON.parse(localStorage.getItem("recentRunners"))||[];

if(recent.length===0){

const empty=document.createElement("div");
empty.className="no-runners";
empty.textContent="No recent searches";

container.appendChild(empty);

}else{

recent.forEach(name=>{

const box=document.createElement("div");
box.className="runner-box";
box.textContent=name;

box.onclick=()=>{
window.location.href=`player.html?name=${name}`;
};

container.appendChild(box);

});

}

</script>

</body>
</html>
