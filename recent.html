<!DOCTYPE html>
<html>

<head>

<title>Recent Runners</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

/* PAGE */

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#020304;
color:white;
}

/* BACKGROUND */

.background{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("background.jpg");
background-size:cover;
background-position:center;
filter:blur(6px) brightness(20%);
z-index:-2;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
z-index:-1;
}

/* NAV BAR */

.topNav{
display:flex;
justify-content:space-between;
align-items:center;
padding:28px 90px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.navLeft{display:flex;gap:90px;}
.navRight{display:flex;gap:70px;}

.topNav a{
color:#00ff9c;
text-decoration:none;
font-weight:600;
font-size:16px;
transition:0.25s;
}

.topNav a:hover{
color:white;
}

/* PAGE CENTER */

.container{
display:flex;
flex-direction:column;
align-items:center;
margin-top:150px;
}

/* TITLE */

.title{
font-size:44px;
color:#00ff9c;
letter-spacing:3px;
margin-bottom:40px;
text-shadow:0 0 15px rgba(0,255,156,0.35);
}

/* RUNNERS BOX */

.runnersBox{
width:420px;
background:#0f141b;
border:1px solid #1c232b;
border-radius:8px;
padding:25px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

/* RUNNER */

.runner{
padding:15px;
border-bottom:1px solid #1a1f26;
cursor:pointer;
transition:0.2s;
font-size:18px;
}

.runner:last-child{
border-bottom:none;
}

.runner:hover{
background:#141a22;
color:#00ff9c;
}

/* EMPTY MESSAGE */

.empty{
text-align:center;
opacity:0.35;
font-size:16px;
letter-spacing:1px;
padding:20px;
}

/* FOOTER */

footer{
position:absolute;
bottom:30px;
width:100%;
text-align:center;
opacity:0.6;
font-size:14px;
transition:0.3s;
cursor:pointer;
}

footer:hover{
opacity:1;
color:#00ff9c;
letter-spacing:1px;
}

</style>

</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<nav class="topNav">

<div class="navLeft">

<a href="/">Home</a>

<a href="/recent.html">Recent Runners</a>

</div>

<div class="navRight">

<a href="/login.html">Login</a>

<a href="/signup.html">Create Account</a>

</div>

</nav>

<div class="container">

<h1 class="title">Recently Searched Runners</h1>

<div class="runnersBox" id="recentList"></div>

</div>

<footer>
Not affiliated with Marathon.
</footer>

<script src="app.js"></script>

<script>

function loadRecentRunners(){

const list=document.getElementById("recentList")

const runners=JSON.parse(localStorage.getItem("recentRunners")) || []

if(runners.length===0){

list.innerHTML="<div class='empty'>No recent searches</div>"

return

}

list.innerHTML=""

runners.forEach(name=>{

const div=document.createElement("div")

div.className="runner"

div.innerText=name

div.onclick=()=>{

window.location.href="/player.html?name="+name

}

list.appendChild(div)

})

}

document.addEventListener("DOMContentLoaded",loadRecentRunners)

</script>

</body>

</html>
