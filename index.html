<!DOCTYPE html>
<html>

<head>
<title>MarathonTracker.gg</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial;
margin:0;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
background:#111;
border-bottom:1px solid #222;
display:flex;
justify-content:space-between;
padding:15px 40px;
}

.logo{
color:#00ff9c;
font-weight:bold;
font-size:20px;
}

.navlinks a{
color:#aaa;
margin-left:20px;
text-decoration:none;
}

.navlinks a:hover{
color:#00ff9c;
}

/* HERO */

.hero{
height:80vh;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
padding-top:180px;
}

.title{
font-size:64px;
color:#00ff9c;
text-shadow:0 0 15px #00ff9c;
}

.searchBox{
margin-top:30px;
display:flex;
gap:10px;
}

input{
padding:14px;
width:260px;
background:#1a1a1a;
border:none;
border-radius:8px;
color:white;
}

button{
background:#00ff9c;
border:none;
padding:14px 20px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00d683;
}

.footer{
text-align:center;
font-size:12px;
color:#666;
padding:40px;
}

</style>

</head>

<body>

<div class="navbar">

<div class="logo">MarathonTracker.gg</div>

<div class="navlinks">
<a href="/">Home</a>
<a href="recent.html">Recently Searched</a>
<a href="leaderboard.html">Leaderboard</a>
<a href="weapons.html">Weapons</a>
</div>

</div>

<div class="hero">

<h1 class="title">MARATHON TRACKER GG</h1>

<p>Track stats, weapons and extractions</p>

<div class="searchBox">

<input id="playerName" placeholder="Search Runner">

<button onclick="searchPlayer()">Search</button>

</div>

</div>

<div class="footer">
Not affiliated with Marathon.
</div>

<script src="app.js"></script>

</body>
</html>
