<!DOCTYPE html>
<html>

<head>

<title>MarathonTracker.gg</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial, Helvetica, sans-serif;
margin:0;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
background:#111;
border-bottom:1px solid #222;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
z-index:10;
}

.logo{
color:#00ff9c;
font-weight:bold;
font-size:20px;
}

.navlinks a{
color:#aaa;
margin-left:20px;
text-decoration:none;
font-size:14px;
}

.navlinks a:hover{
color:#00ff9c;
}

/* HERO */

.hero{
height:80vh;
display:flex;
flex-direction:column;
justify-content:flex-start;
align-items:center;
text-align:center;
padding-top:160px;
}

.title{
font-size:64px;
letter-spacing:4px;
margin-bottom:10px;
color:#00ff9c;
text-shadow:0 0 10px #00ff9c,0 0 30px #00ff9c;
}

.subtitle{
color:#aaa;
margin-bottom:40px;
}

.searchBox{
display:flex;
gap:10px;
}

input{
padding:14px;
font-size:18px;
border-radius:8px;
border:none;
width:260px;
background:#1a1a1a;
color:white;
outline:none;
}

button{
background:#00ff9c;
border:none;
padding:14px 20px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

button:hover{
background:#00d683;
transform:scale(1.05);
}

/* FOOTER */

.footer{
text-align:center;
font-size:12px;
color:#666;
padding:40px;
}

</style>

</head>

<body>

<div class="navbar">

<div class="logo">
MarathonTracker.gg
</div>

<div class="navlinks">
<a href="/">Home</a>
<a href="recent.html">Recently Searched</a>
</div>

</div>

<div class="hero">

<h1 class="title">MARATHON TRACKER GG</h1>

<p class="subtitle">Track stats, weapons, and extractions</p>

<div class="searchBox">

<input id="playerName" placeholder="Search Runner"/>

<button onclick="searchPlayer()">Search</button>

</div>

</div>

<div class="footer">
Not affiliated with Marathon.
</div>

<script src="app.js"></script>

</body>

</html>
