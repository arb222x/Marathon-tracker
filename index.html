<!DOCTYPE html>
<html>

<head>

<title>Marathon Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Google Font close to Marathon UI style -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

/* PAGE */

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#020304;
color:white;
overflow-x:hidden;
}

/* BACKGROUND IMAGE */

.background{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background-image:url("background.jpg");

background-size:cover;
background-position:center;

/* darker + blur */

filter:blur(6px) brightness(20%);

z-index:-2;

}

/* extra dark overlay */

.overlay{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.65);

z-index:-1;

}

/* NAV BAR */

.topNav{

display:flex;
justify-content:space-between;
align-items:center;

padding:28px 90px;

border-bottom:1px solid rgba(255,255,255,0.05);

}

.navLeft{display:flex;gap:90px;}

.navRight{display:flex;gap:70px;}

.topNav a{

color:#00ff9c;

text-decoration:none;

font-weight:600;

font-size:16px;

transition:0.25s;

}

.topNav a:hover{

color:white;

}

/* HERO */

.hero{

text-align:center;

margin-top:180px;

}

/* MAIN TITLE */

.mainTitle{

font-size:72px;

color:#00ff9c;

letter-spacing:4px;

margin-bottom:5px;

text-shadow:0 0 20px rgba(0,255,156,0.35);

}

/* GG */

.gg{

font-size:30px;

letter-spacing:6px;

color:#00ff9c;

opacity:0.85;

margin-bottom:55px;

}

/* SEARCH */

.searchBox{

display:flex;
justify-content:center;
gap:14px;

}

.searchBox input{

padding:16px;

width:340px;

background:#0f141b;

border:1px solid #1c232b;

color:white;

font-size:18px;

outline:none;

}

.searchBox button{

padding:16px 26px;

background:#00ff9c;

border:none;

font-weight:700;

cursor:pointer;

transition:0.2s;

}

.searchBox button:hover{

background:#00e589;

}

/* FOOTER */

footer{

position:absolute;

bottom:30px;

width:100%;

text-align:center;

opacity:0.6;

font-size:14px;

transition:0.3s;

cursor:pointer;

}

footer:hover{

opacity:1;

color:#00ff9c;

letter-spacing:1px;

}

</style>

</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<nav class="topNav">

<div class="navLeft">

<a href="/">Home</a>

<a href="/recent.html">Recent Runners</a>

</div>

<div class="navRight">

<a href="/login.html">Login</a>

<a href="/signup.html">Create Account</a>

</div>

</nav>

<div class="hero">

<h1 class="mainTitle">Marathon Tracker</h1>
<div class="gg">GG</div>

<div class="searchBox">

<input id="playerName" placeholder="Search Runner">

<button onclick="searchPlayer()">Search</button>

</div>

</div>

<footer>

Not affiliated with Marathon.

</footer>

<script src="app.js"></script>

<script>

function searchPlayer(){

const player=document.getElementById("playerName").value;

if(!player)return;

window.location.href="/player.html?name="+player;

}

</script>

</body>

</html>
