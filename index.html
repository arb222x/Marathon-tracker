<!DOCTYPE html>
<html>

<head>
<title>Marathon Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
color:white;
}

/* NAV BAR */

.nav{
position:absolute;
top:30px;
left:40px;
display:flex;
align-items:center;
gap:25px;
z-index:5;
}

.nav a{
display:flex;
align-items:center;
gap:8px;
text-decoration:none;
color:white;
font-size:14px;
letter-spacing:1px;
}

.nav a:hover{
color:#00ff9c;
}

/* HOME ICON */

.home-icon{
width:26px;
height:26px;
stroke:white;
fill:none;
stroke-width:2;
transition:.2s;
}

.nav a:hover .home-icon{
stroke:#00ff9c;
filter:drop-shadow(0 0 6px #00ff9c);
}

/* HERO */

.hero{
display:flex;
flex-direction:column;
align-items:center;
margin-top:180px;
}

.title{
font-size:72px;
letter-spacing:6px;
color:#00ff9c;
text-shadow:0 0 30px #00ff9c;
}

/* SEARCH */

.search-container{
margin-top:120px;
}

.search-box{
display:flex;
background:#0b0f14;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 20px rgba(0,255,156,.25);
transition:.25s;
}

.search-box input{
padding:16px 20px;
width:320px;
border:none;
background:transparent;
color:white;
outline:none;
font-family:'Orbitron',sans-serif;
font-size:14px;
}

.search-box button{
background:#00ff9c;
border:none;
padding:16px 25px;
font-weight:800;
cursor:pointer;
}

.search-box button:hover{
box-shadow:0 0 10px #00ff9c;
}

/* ERROR */

.error{
box-shadow:0 0 25px #ff4d4d !important;
}

/* SUCCESS */

.success{
box-shadow:0 0 25px #00ff9c !important;
}

/* FOOTER */

.footer{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
font-size:12px;
opacity:.5;
}

</style>

</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<!-- NAV -->

<div class="nav">

<a href="/">

<svg class="home-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
<path d="M3 11L12 4l9 7"/>
<path d="M5 10v10h14V10"/>
</svg>

</a>

<a href="/recent.html">Recent Runners</a>

</div>

<!-- HERO -->

<div class="hero">

<div class="title">MARATHON TRACKER</div>

<div class="search-container">

<div class="search-box" id="searchBox">

<input
id="runnerInput"
placeholder="Enter runner name"
onkeypress="if(event.key==='Enter'){searchRunner()}"
>

<button onclick="searchRunner()">Search</button>

</div>

</div>

</div>

<div class="footer">
Not affiliated with Bungie.
</div>

<script>

async function searchRunner(){

const input=document.getElementById("runnerInput");
const box=document.getElementById("searchBox");

box.classList.remove("error","success");

const name=input.value.trim();

if(name==="") return;

try{

/* Bungie API call */

const res = await fetch(
`https://www.bungie.net/Platform/User/Search/GlobalName/0/${name}/`,
{
headers:{
"X-API-Key":"YOUR_API_KEY_HERE"
}
}
);

const data = await res.json();

if(data.Response && data.Response.searchResults.length>0){

box.classList.add("success");

/* save recent */

let recent=JSON.parse(localStorage.getItem("recentRunners"))||[];

if(!recent.includes(name)) recent.unshift(name);

recent=recent.slice(0,10);

localStorage.setItem("recentRunners",JSON.stringify(recent));

setTimeout(()=>{
window.location.href=`player.html?name=${name}`;
},400);

}else{

box.classList.add("error");

}

}catch{

box.classList.add("error");

}

}

</script>

</body>
</html>
