<!DOCTYPE html>
<html>

<head>

<title>Marathon Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#020304;
color:white;
}

/* BACKGROUND */

.background{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("background.jpg");
background-size:cover;
background-position:center;
filter:blur(12px) brightness(10%);
z-index:-2;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.75);
z-index:-1;
}

/* NAV */

.nav{
display:flex;
justify-content:space-between;
padding:25px 50px;
}

.nav a{
color:white;
text-decoration:none;
margin-right:30px;
opacity:.85;
}

.nav-right a{
color:#00ff9c;
margin-left:20px;
}

.nav a:hover{
opacity:1;
}

/* HERO */

.hero{
text-align:center;
margin-top:150px;
}

.title{
font-size:72px;
letter-spacing:6px;
color:#00ff9c;
}

.subtitle{
opacity:.6;
margin-top:10px;
}

/* SEARCH */

.search{
margin-top:50px;
display:flex;
justify-content:center;
}

.search input{
width:380px;
padding:16px;
background:#0b0f14;
border:1px solid #1c232b;
color:white;
border-radius:6px 0 0 6px;
}

.search button{
padding:16px 25px;
border:none;
background:#00ff9c;
font-weight:700;
cursor:pointer;
border-radius:0 6px 6px 0;
}

.search button:hover{
background:#00e589;
}

.footer{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
font-size:12px;
opacity:.5;
}

</style>

</head>

<body onload="updateNav()">

<div class="background"></div>
<div class="overlay"></div>

<div class="nav">

<div>

<a href="/">Home</a>
<a href="/profilesearch.html">Search Profiles</a>

</div>

<div class="nav-right">

<a id="profileBtn" href="/profile.html">Profile</a>

<a id="loginBtn" href="/login.html">Login</a>

<a id="signupBtn" href="/signup.html">Create Account</a>

</div>

</div>

<div class="hero">

<div class="title">MARATHON TRACKER</div>

<div class="subtitle">Search Runner Stats</div>

<div class="search">

<input id="playerName" placeholder="Search Runner">

<button onclick="searchPlayer()">Search</button>

</div>

</div>

<div class="footer">

Not affiliated with Bungie.

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="app.js"></script>

</body>
</html>
```
