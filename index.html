<!DOCTYPE html>
<html>

<head>
<title>Marathon Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
color:white;
overflow-x:hidden;
}

/* NAV */
.nav{
position:absolute;
top:30px;
left:40px;
z-index:5;
}

.home-btn{
position:relative;
display:flex;
align-items:center;
}

.home-btn svg{
width:32px;
height:32px;
stroke:white;
transition:.25s;
}

.home-btn:hover svg{
stroke:#00ff9c;
filter:drop-shadow(0 0 8px #00ff9c);
}

/* TOOLTIP */
.home-btn::after{
content:"Home";
position:absolute;
top:42px;
left:50%;
transform:translateX(-50%);
background:#0b0f14;
color:#00ff9c;
font-size:12px;
padding:4px 8px;
border-radius:6px;
opacity:0;
transition:.2s;
white-space:nowrap;
}

.home-btn:hover::after{
opacity:1;
}

/* HERO */
.hero{
display:flex;
flex-direction:column;
align-items:center;
margin-top:160px;
}

.title{
font-size:72px;
letter-spacing:6px;
color:#00ff9c;
text-shadow:0 0 30px #00ff9c;
}

/* SEARCH */
.search-container{
margin-top:120px;
}

.search-box{
display:flex;
background:#0b0f14;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 20px rgba(0,255,156,.3);
}

.search-box input{
padding:15px 18px;
width:300px;
border:none;
background:transparent;
color:white;
outline:none;
font-family:'Orbitron',sans-serif;
}

.search-box button{
background:#00ff9c;
border:none;
padding:15px 22px;
font-weight:800;
cursor:pointer;
}

.search-box button:hover{
box-shadow:0 0 10px #00ff9c;
}

/* FOOTER */
.footer{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
font-size:12px;
opacity:.5;
}

</style>

</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="nav">
<a href="/" class="home-btn">

<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2">
<path stroke-linecap="round" stroke-linejoin="round"
d="M3 10.75L12 4l9 6.75M5 10v9h14v-9"/>
</svg>

</a>
</div>

<div class="hero">

<div class="title">MARATHON TRACKER</div>

<div class="search-container">

<div class="search-box">

<input id="runnerInput" placeholder="Enter runner name">

<button onclick="searchRunner()">Search</button>

</div>

</div>

</div>

<div class="footer">
Not affiliated with Bungie.
</div>

<script>

function searchRunner(){

const input=document.getElementById("runnerInput");
const name=input.value.trim();

if(name==="") return;

let recent=JSON.parse(localStorage.getItem("recentRunners"))||[];

if(!recent.includes(name)){
recent.unshift(name);
}

recent=recent.slice(0,10);

localStorage.setItem("recentRunners",JSON.stringify(recent));

window.location.href=`player.html?name=${name}`;

}

</script>

</body>
</html>
