<!DOCTYPE html>
<html>

<head>

<title>Marathon Tracker GG</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#020304;
color:white;
}

/* BACKGROUND */

.background{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("background.jpg");
background-size:cover;
background-position:center;
filter:blur(10px) brightness(12%);
z-index:-2;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:-1;
}

/* NAVBAR */

.nav{

display:flex;
justify-content:space-between;

padding:25px 40px;

font-size:16px;

}

.nav-left a{

margin-right:30px;

text-decoration:none;

color:white;

opacity:.85;

}

.nav-right a{

margin-left:25px;

text-decoration:none;

color:#00ff9c;

}

.nav a:hover{

opacity:1;

}

/* HERO */

.hero{

text-align:center;

margin-top:140px;

}

/* TITLE */

.title{

font-size:70px;

letter-spacing:6px;

color:#00ff9c;

margin-bottom:10px;

}

.subtitle{

font-size:22px;

opacity:.7;

margin-bottom:40px;

}

/* SEARCH */

.search-box{

display:flex;

justify-content:center;

}

.search-box input{

width:380px;

padding:16px;

border:none;

background:#0b0f14;

border:1px solid #1c232b;

color:white;

font-size:16px;

border-radius:6px 0 0 6px;

}

.search-box button{

padding:16px 24px;

border:none;

background:#00ff9c;

font-weight:700;

cursor:pointer;

border-radius:0 6px 6px 0;

}

.search-box button:hover{

background:#00e589;

}

/* FOOTER */

.footer{

position:fixed;

bottom:20px;

width:100%;

text-align:center;

font-size:12px;

opacity:.5;

}

.footer:hover{

opacity:.8;

}

</style>

</head>

<body onload="updateNav()">

<div class="background"></div>
<div class="overlay"></div>

<!-- NAVIGATION -->

<div class="nav">

<div class="nav-left">

<a href="/">Home</a>
<a href="/recent.html">Recent Runners</a>

</div>

<div class="nav-right">

<a id="profileBtn" href="/profile.html">Profile</a>

<a id="loginBtn" href="/login.html">Login</a>

<a id="signupBtn" href="/signup.html">Create Account</a>

</div>

</div>

<!-- HERO -->

<div class="hero">

<div class="title">MARATHON TRACKER</div>

<div class="subtitle">Search Runner Stats</div>

<div class="search-box">

<input id="playerName" placeholder="Search Runner">

<button onclick="searchPlayer()">Search</button>

</div>

</div>

<!-- FOOTER -->

<div class="footer">

Not affiliated with Bungie or Marathon.

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="app.js"></script>

</body>

</html>
```
