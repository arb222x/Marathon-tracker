<!DOCTYPE html>
<html>

<head>

<title>Marathon Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Orbitron',sans-serif;
  font-weight:600;
  background:#020304;
  color:white;
}

/* BACKGROUND */
.background{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background-image:url("background.jpg");
  background-size:cover;
  background-position:center;
  filter:blur(10px) brightness(15%);
  z-index:-2;
}

.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.75);
  z-index:-1;
}

/* NAVBAR */
.nav{
  display:flex;
  justify-content:space-between;
  padding:25px 60px;
  font-weight:800;
}

.nav-left a, .nav-right a{
  text-decoration:none;
  margin-right:35px;
  color:white;
  transition:.25s;
}

.nav-left a:hover, .nav-right a:hover{
  color:#00ff9c;
  text-shadow:0 0 12px #00ff9c;
}

.nav-right{
  display:flex;
}

/* HERO */
.hero{
  text-align:center;
  margin-top:150px;
}

.title{
  font-size:80px;
  letter-spacing:8px;
  color:#00ff9c;
  text-shadow:0 0 25px #00ff9c;
}

.subtitle{
  opacity:.7;
  margin-top:10px;
}

/* SEARCH */
.search-container{
  margin-top:50px;
  display:flex;
  justify-content:center;
}

.search{
  display:flex;
  width:500px;
  border-radius:12px;
  overflow:hidden;
  background:#0b0f14;
  box-shadow:0 0 10px rgba(0,255,156,0.2);
  transition: all 0.3s ease;
}

.search:hover{
  box-shadow:0 0 25px #00ff9c;
  transform: translateY(-2px);
}

.search input{
  flex:1;
  padding:16px;
  background:transparent;
  border:none;
  color:white;
  outline:none;
}

.search button{
  padding:16px 25px;
  border:none;
  background:#00ff9c;
  font-weight:800;
  cursor:pointer;
}

.search button:hover{
  box-shadow:0 0 15px #00ff9c;
}

/* FOOTER */
.footer{
  position:fixed;
  bottom:20px;
  width:100%;
  text-align:center;
  font-size:12px;
  opacity:.5;
}

.footer:hover{
  opacity:.9;
  text-shadow:0 0 10px #00ff9c;
}

</style>

</head>

<body onload="updateNav()">

<div class="background"></div>
<div class="overlay"></div>

<!-- NAVIGATION -->
<div class="nav">
  <div class="nav-left">
    <a href="/">Home</a>
    <a href="/recent.html">Recent Runners  </div>
  </div>
  </div>

<!-- HERO -->
<div class="hero">
  <div class="title">MARATHON TRACKER</div>
  <div class="subtitle">Search Runner Stats</div>
  
  <div class="search-container">
    <div class="search">
      <input id="playerName" placeholder="Search Runner">
      <button onclick="searchPlayer()">Search</button>
    </div>
  </div>
  
</div>

<div class="footer">
  Not affiliated with Bungie.
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="app.js"></script>

</body>
</html>
