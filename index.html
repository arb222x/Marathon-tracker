<!DOCTYPE html>
<html>

<head>
<title>Marathon Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Orbitron',sans-serif;
font-weight:600;
background:#020304;
color:white;
position:relative;
overflow-x:hidden;
}

/* BACKGROUND */
.background{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("background.jpg");
background-size:cover;
background-position:center;
filter:blur(10px) brightness(15%);
z-index:-3;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.75);
z-index:-2;
}

/* NAVBAR */
.nav{
display:flex;
justify-content:flex-start;
padding:25px 60px;
font-weight:800;
}

.nav a{
text-decoration:none;
margin-right:35px;
color:white;
transition:.25s;
display:flex;
align-items:center;
}

.nav svg{
width:28px;
height:28px;
transition:.25s;
}

.nav a:hover svg{
stroke:#00ff9c;
filter:drop-shadow(0 0 8px #00ff9c);
}

/* HERO */
.hero{
text-align:center;
margin-top:150px;
}

.title{
font-size:80px;
letter-spacing:8px;
color:#00ff9c;
text-shadow:0 0 25px #00ff9c;
}

.subtitle{
opacity:.7;
margin-top:10px;
}

/* SEARCH */
.search-container{
margin-top:110px;
display:flex;
justify-content:center;
}

.search{
display:flex;
width:500px;
border-radius:12px;
overflow:hidden;
background:#0b0f14;
box-shadow:0 0 10px rgba(0,255,156,.2);
transition:.3s;
}

.search:hover{
box-shadow:0 0 25px #00ff9c;
transform:translateY(-2px);
}

.search input{
flex:1;
padding:16px;
background:transparent;
border:none;
color:white;
outline:none;
}

.search button{
padding:16px 25px;
border:none;
background:#00ff9c;
font-weight:800;
cursor:pointer;
}

.search button:hover{
box-shadow:0 0 15px #00ff9c;
}

/* FOOTER */
.footer{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
font-size:12px;
opacity:.5;
}

.footer:hover{
opacity:.9;
text-shadow:0 0 10px #00ff9c;
}
</style>

</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="nav">

<a href="/" title="Home">

<!-- PROFESSIONAL HOME ICON -->
<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
<path stroke-linecap="round" stroke-linejoin="round" d="M3 10.75L12 4l9 6.75M5 10v9h14v-9"/>
</svg>

</a>

<a href="/recent.html">Recent Runners</a>

</div>

<div class="hero">

<div class="title">MARATHON TRACKER</div>

<div class="subtitle">Search Runner Stats</div>

<div class="search-container">
<div class="search">
<input id="playerName" placeholder="Search Runner">
<button onclick="searchPlayer()">Search</button>
</div>
</div>

</div>

<div class="footer">
Not affiliated with Bungie.
</div>

<script src="app.js"></script>

</body>
</html>
