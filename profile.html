<!DOCTYPE html>
<html>

<head>

<title>Runner Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
background:#020304;
font-family:'Orbitron',sans-serif;
color:white;
text-align:center;
}

.container{

width:500px;
margin:auto;
margin-top:100px;

background:#0f141b;

padding:40px;

border-radius:10px;

}

input,textarea{

width:100%;

padding:12px;

margin:10px 0;

background:#0b0f14;

border:1px solid #1c232b;

color:white;

}

button{

padding:12px 20px;

background:#00ff9c;

border:none;

cursor:pointer;

}

</style>

</head>

<body onload="loadProfile()">

<div class="container">

<h2>Runner Profile</h2>

<input id="username" placeholder="Username">

<input id="bungie" placeholder="Bungie ID">

<input id="favorite" placeholder="Favorite Runner">

<textarea id="bio" placeholder="Bio"></textarea>

<button onclick="saveProfile()">Save Profile</button>

<button onclick="logout()">Logout</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="app.js"></script>

</body>
</html>
