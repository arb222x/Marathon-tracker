<!DOCTYPE html>
<html>

<head>
<title>Marathon Tracker - Player Stats</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#020304;
color:white;
min-height:100vh;
overflow-x:hidden;
}

/* BACKGROUND */

.background{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("background.jpg");
background-size:cover;
background-position:center;
filter:blur(14px) brightness(15%);
z-index:-2;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.75);
z-index:-1;
}

/* NAV */

.nav{
display:flex;
align-items:center;
gap:25px;
padding:25px 40px;
}

.nav a{
display:flex;
align-items:center;
gap:10px;
text-decoration:none;
color:white;
font-weight:700;
}

.home-icon{
width:26px;
height:26px;
stroke:white;
fill:none;
stroke-width:2;
transition:.2s;
}

.nav a:hover .home-icon{
stroke:#00ff9c;
filter:drop-shadow(0 0 8px #00ff9c);
}

/* HERO */

.hero{
width:100%;
max-width:1200px;
margin:auto;
padding:20px;
}

.title{
font-size:64px;
letter-spacing:5px;
color:#00ff9c;
text-shadow:0 0 20px #00ff9c;
margin-bottom:40px;
text-align:center;
}

/* TOP STATS */

.top-stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:50px;
}

.big-stat{
background:rgba(10,14,18,.9);
padding:30px;
border-radius:18px;
text-align:center;
border:1px solid rgba(0,255,156,.3);
box-shadow:0 8px 30px rgba(0,255,156,.25);
transition:.25s;
}

.big-stat:hover{
transform:translateY(-6px);
box-shadow:0 10px 40px rgba(0,255,156,.5);
}

.big-stat h2{
margin:0;
font-size:42px;
color:#00ff9c;
}

.big-stat span{
font-size:13px;
letter-spacing:2px;
opacity:.8;
}

/* CATEGORY GRID */

.stat-sections{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;
}

/* CATEGORY CARD */

.section{
background:rgba(10,14,18,.85);
border-radius:18px;
padding:25px;
border:1px solid rgba(0,255,156,.25);
box-shadow:0 8px 30px rgba(0,255,156,.2);
backdrop-filter:blur(8px);
}

.section h3{
margin-top:0;
margin-bottom:20px;
font-size:20px;
color:#00ff9c;
text-shadow:0 0 10px #00ff9c;
}

/* STAT GRID */

.stat-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

/* SMALL STAT TILE */

.stat{
background:rgba(0,0,0,.35);
border-radius:10px;
padding:14px;
text-align:center;
}

.stat-value{
font-size:20px;
color:#00ff9c;
font-weight:800;
}

.stat-label{
font-size:11px;
opacity:.7;
letter-spacing:1px;
}

/* FOOTER */

.footer{
text-align:center;
font-size:12px;
opacity:.5;
padding:20px;
margin-top:40px;
}

</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<!-- NAV -->

<div class="nav">

<a href="/">

<svg class="home-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
<path d="M3 11L12 4l9 7"/>
<path d="M5 10v10h14V10"/>
</svg>

</a>

</div>

<div class="hero">

<div class="title" id="playerNameTitle">Player</div>

<!-- TOP STATS -->

<div class="top-stats">

<div class="big-stat">
<h2 id="kd">0</h2>
<span>K/D RATIO</span>
</div>

<div class="big-stat">
<h2 id="matches">0</h2>
<span>MATCHES</span>
</div>

<div class="big-stat">
<h2 id="wins">0</h2>
<span>WINS</span>
</div>

<div class="big-stat">
<h2 id="extraction">0%</h2>
<span>EXTRACTION RATE</span>
</div>

</div>

<!-- STAT SECTIONS -->

<div class="stat-sections">

<!-- COMBAT -->

<div class="section">

<h3>Combat</h3>

<div class="stat-grid">

<div class="stat">
<div class="stat-value" id="kills">0</div>
<div class="stat-label">Kills</div>
</div>

<div class="stat">
<div class="stat-value" id="deaths">0</div>
<div class="stat-label">Deaths</div>
</div>

<div class="stat">
<div class="stat-value" id="score">0</div>
<div class="stat-label">Score</div>
</div>

<div class="stat">
<div class="stat-value" id="streak">0</div>
<div class="stat-label">Best Streak</div>
</div>

</div>

</div>

<!-- PERFORMANCE -->

<div class="section">

<h3>Performance</h3>

<div class="stat-grid">

<div class="stat">
<div class="stat-value" id="losses">0</div>
<div class="stat-label">Losses</div>
</div>

<div class="stat">
<div class="stat-value" id="timePlayed">0h</div>
<div class="stat-label">Time Played</div>
</div>

<div class="stat">
<div class="stat-value" id="perimeter">0</div>
<div class="stat-label">Perimeter</div>
</div>

<div class="stat">
<div class="stat-value" id="direMarsh">0</div>
<div class="stat-label">Dire Marsh</div>
</div>

</div>

</div>

<!-- WEAPONS -->

<div class="section">

<h3>Weapons</h3>

<div class="stat-grid">

<div class="stat">
<div class="stat-value" id="topWeapon">None</div>
<div class="stat-label">Top Weapon</div>
</div>

<div class="stat">
<div class="stat-value" id="favWeapon">None</div>
<div class="stat-label">Favorite Weapon</div>
</div>

</div>

</div>

<!-- MAPS -->

<div class="section">

<h3>Maps</h3>

<div class="stat-grid">

<div class="stat">
<div class="stat-value" id="favoriteMap">None</div>
<div class="stat-label">Favorite Map</div>
</div>

<div class="stat">
<div class="stat-value" id="outpost">0</div>
<div class="stat-label">Outpost Matches</div>
</div>

</div>

</div>

</div>

</div>

<div class="footer">
Not affiliated with Bungie.
</div>

<script>

function displayPlayerStats(playerData){

document.getElementById('playerNameTitle').textContent = playerData.username;

document.getElementById('score').textContent = playerData.score;
document.getElementById('matches').textContent = playerData.matches;
document.getElementById('kills').textContent = playerData.kills;
document.getElementById('deaths').textContent = playerData.deaths;

document.getElementById('kd').textContent =
(playerData.kills/Math.max(playerData.deaths,1)).toFixed(2);

document.getElementById('wins').textContent = playerData.wins;
document.getElementById('losses').textContent = playerData.losses;
document.getElementById('streak').textContent = playerData.longestStreak;

document.getElementById('timePlayed').textContent =
playerData.totalTimePlayed + "h";

document.getElementById('extraction').textContent =
playerData.extractionRate + "%";

document.getElementById('topWeapon').textContent =
playerData.topWeapon;

document.getElementById('favWeapon').textContent =
playerData.favoriteWeapon;

document.getElementById('favoriteMap').textContent =
playerData.favoriteMap;

document.getElementById('perimeter').textContent =
playerData.perimeterMatches;

document.getElementById('direMarsh').textContent =
playerData.direMarshMatches;

document.getElementById('outpost').textContent =
playerData.outpostMatches;

}

/* Example data */

displayPlayerStats({

username:"Runner123",
score:15200,
kills:256,
deaths:120,
matches:45,
wins:20,
losses:25,
topWeapon:"Bolt Rifle",
favoriteWeapon:"Laser Rifle",
favoriteMap:"Perimeter",
extractionRate:78,
longestStreak:12,
totalTimePlayed:85,
perimeterMatches:15,
direMarshMatches:18,
outpostMatches:12

});

</script>

</body>
</html>
