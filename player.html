<!DOCTYPE html>
<html>

<head>
<title>Marathon Tracker - Player Stats</title>

<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  font-weight: 600;
  background: #020304;
  color: white;
}

/* NAVBAR */
.nav {
  display: flex;
  align-items: center;
  padding: 20px 40px;
  font-weight: 800;
}

.nav a {
  text-decoration: none;
  color: #00ff9c;
  display: flex;
  align-items: center;
  transition: 0.25s;
}

.nav a:hover {
  text-shadow: 0 0 12px #00ff9c;
}

.nav a svg {
  margin-right: 8px;
  fill: #00ff9c;
}

/* HERO / PLAYER STATS */
.hero {
  text-align: center;
  margin-top: 100px;
}

.title {
  font-size: 60px;
  letter-spacing: 6px;
  color: #00ff9c;
  text-shadow: 0 0 20px #00ff9c;
  margin-bottom: 20px;
}

.subtitle {
  opacity: .7;
  margin-bottom: 40px;
}

/* PLAYER STATS BOX */
.stats-box {
  width: 500px;
  margin: 0 auto;
  background: #0b0f14;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 0 15px rgba(0, 255, 156, 0.4);
  text-align: left;
  color: #00ff9c;
  font-weight: 800;
}

.stats-box h2 {
  margin-top: 0;
  margin-bottom: 12px;
  font-size: 28px;
  text-align: center;
  text-shadow: 0 0 12px #00ff9c;
}

.stats-box p {
  margin: 6px 0;
}

/* FOOTER */
.footer {
  position: fixed;
  bottom: 20px;
  width: 100%;
  text-align: center;
  font-size: 12px;
  opacity: .5;
}

.footer:hover {
  opacity: .9;
  text-shadow: 0 0 10px #00ff9c;
}

</style>

</head>

<body>

<!-- NAVIGATION -->
<div class="nav">
  <a href="/">
    <!-- Home Icon SVG -->
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
      <path d="M12 3l10 9h-3v9h-6v-6h-2v6H5v-9H2z"/>
    </svg>
    Home
  </a>
</div>

<!-- HERO -->
<div class="hero">
  <div class="title" id="playerNameTitle">Player Name</div>
  <div class="subtitle">Marathon Stats</div>
  
  <div class="stats-box" id="statsBox">
    <h2>Stats Overview</h2>
    <p>Kills: <span id="kills">0</span></p>
    <p>Deaths: <span id="deaths">0</span></p>
    <p>Matches Played: <span id="matches">0</span></p>
    <p>Top Weapon: <span id="topWeapon">None</span></p>
    <p>Favorite Map: <span id="favoriteMap">None</span></p>
    <p>Extraction Rate: <span id="extraction">0%</span></p>
  </div>
</div>

<div class="footer">
  Not affiliated with Bungie.
</div>

<script src="app.js"></script>
<script>
// Example: fill stats dynamically after search
function displayPlayerStats(playerData) {
  document.getElementById('playerNameTitle').textContent = playerData.username;
  document.getElementById('kills').textContent = playerData.kills;
  document.getElementById('deaths').textContent = playerData.deaths;
  document.getElementById('matches').textContent = playerData.matches;
  document.getElementById('topWeapon').textContent = playerData.topWeapon;
  document.getElementById('favoriteMap').textContent = playerData.favoriteMap;
  document.getElementById('extraction').textContent = playerData.extractionRate + '%';
}

// Example usage with dummy data (replace with Bungie API fetch)
displayPlayerStats({
  username: "Runner123",
  kills: 256,
  deaths: 120,
  matches: 45,
  topWeapon: "Bolt Rifle",
  favoriteMap: "Perimeter",
  extractionRate: 78
});
</script>

</body>
</html>
