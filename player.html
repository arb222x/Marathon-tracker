<!DOCTYPE html>
<html>

<head>

<title>Runner Stats</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="header">

<div class="logo">
MarathonTracker.gg
</div>

</div>

<div class="playerContainer">

<h1 id="playerTitle" class="playerName"></h1>

<div class="statsGrid">

<div class="statCard">
<h2>Kills</h2>
<p id="kills"></p>
</div>

<div class="statCard">
<h2>Deaths</h2>
<p id="deaths"></p>
</div>

<div class="statCard">
<h2>KD</h2>
<p id="kd"></p>
</div>

<div class="statCard">
<h2>Extractions</h2>
<p id="extract"></p>
</div>

</div>


<h2 class="sectionTitle">Match History</h2>

<table class="table" id="matchTable">

<tr>
<th>Match</th>
<th>Kills</th>
<th>Result</th>
</tr>

</table>


<h2 class="sectionTitle">Weapon Stats</h2>

<table class="table" id="weaponTable">

<tr>
<th>Weapon</th>
<th>Kills</th>
</tr>

</table>


<h2 class="sectionTitle">Extraction Stats</h2>

<table class="table" id="extractTable">

<tr>
<th>Map</th>
<th>Extractions</th>
</tr>

</table>


</div>

<script src="app.js"></script>

</body>

</html>
