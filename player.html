<!DOCTYPE html>
<html>

<head>

<title>Runner Stats</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial, Helvetica, sans-serif;
margin:0;
}

.navbar{
background:#111;
border-bottom:1px solid #222;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
}

.logo{
color:#00ff9c;
font-weight:bold;
}

.container{
max-width:1000px;
margin:auto;
padding:60px 20px;
text-align:center;
}

.playerName{
font-size:48px;
margin-bottom:40px;
color:#00ff9c;
}

/* STAT GRID */

.statsGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:50px;
}

.statCard{
background:#121212;
border:1px solid #1f1f1f;
padding:30px;
border-radius:10px;
}

.statCard h3{
color:#aaa;
font-size:14px;
}

.statCard p{
font-size:32px;
color:#00ff9c;
font-weight:bold;
}

/* TABLES */

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#151515;
padding:12px;
text-align:left;
}

td{
padding:12px;
border-bottom:1px solid #222;
}

.section{
margin-top:40px;
}

.footer{
text-align:center;
font-size:12px;
color:#666;
padding:40px;
}

</style>

</head>

<body>

<div class="navbar">
<div class="logo">MarathonTracker.gg</div>
<a href="/" style="color:#aaa;text-decoration:none;">Home</a>
</div>

<div class="container">

<h1 id="playerTitle" class="playerName"></h1>

<div class="statsGrid">

<div class="statCard">
<h3>Kills</h3>
<p id="kills"></p>
</div>

<div class="statCard">
<h3>Deaths</h3>
<p id="deaths"></p>
</div>

<div class="statCard">
<h3>KD</h3>
<p id="kd"></p>
</div>

<div class="statCard">
<h3>Extractions</h3>
<p id="extract"></p>
</div>

</div>

<div class="section">

<h2>Match History</h2>

<table id="matchTable">
<tr>
<th>Match</th>
<th>Kills</th>
<th>Result</th>
</tr>
</table>

</div>

<div class="section">

<h2>Weapon Stats</h2>

<table id="weaponTable">
<tr>
<th>Weapon</th>
<th>Kills</th>
</tr>
</table>

</div>

<div class="section">

<h2>Extraction Stats</h2>

<table id="extractTable">
<tr>
<th>Map</th>
<th>Extractions</th>
</tr>
</table>

</div>

</div>

<div class="footer">
Not affiliated with Marathon.
</div>

<script src="app.js"></script>

</body>

</html>
