<!DOCTYPE html>
<html>

<head>
<title>Marathon Tracker - Player Stats</title>

<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  font-weight: 600;
  background: #020304;
  color: white;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

/* BACKGROUND IMAGE */
.background {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: url("background.jpg");
  background-size: cover;
  background-position: center;
  filter: blur(10px) brightness(15%);
  z-index: -2;
}

/* DARK OVERLAY */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, .75);
  z-index: -1;
}

/* NAVBAR */
.nav {
  display: flex;
  align-items: center;
  padding: 20px 40px;
  font-weight: 800;
  position: relative;
  z-index: 1;
}

.nav a {
  text-decoration: none;
  color: #00ff9c;
  display: flex;
  align-items: center;
  transition: 0.25s;
}

.nav a:hover {
  text-shadow: 0 0 12px #00ff9c;
}

.nav a svg {
  margin-right: 8px;
  fill: #00ff9c;
}

/* HERO / PLAYER STATS */
.hero {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
  z-index: 1;
}

.title {
  font-size: 60px;
  letter-spacing: 6px;
  color: #00ff9c;
  text-shadow: 0 0 20px #00ff9c;
  margin-bottom: 20px;
  text-align: center;
}

.stats-box {
  width: 600px;
  background: #0b0f14;
  padding: 30px 25px;
  border-radius: 12px;
  box-shadow: 0 0 25px rgba(0, 255, 156, 0.4);
  text-align: left;
  color: #00ff9c;
  font-weight: 800;
}

.stats-box h2 {
  margin-top: 0;
  margin-bottom: 20px;
  font-size: 32px;
  text-align: center;
  text-shadow: 0 0 15px #00ff9c;
}

.stats-box p {
  margin: 10px 0;
  font-size: 18px;
}

/* FOOTER */
.footer {
  text-align: center;
  font-size: 12px;
  opacity: .5;
  padding: 10px;
  position: relative;
  z-index: 1;
}

.footer:hover {
  opacity: .9;
  text-shadow: 0 0 10px #00ff9c;
}

</style>

</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<!-- NAVIGATION -->
<div class="nav">
  <a href="/">
    <!-- Home Icon SVG -->
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
      <path d="M12 3l10 9h-3v9h-6v-6h-2v6H5v-9H2z"/>
    </svg>
    Home
  </a>
</div>

<!-- HERO -->
<div class="hero">
  <div class="title" id="playerNameTitle">Player Name</div>
  
  <div class="stats-box" id="statsBox">
    <h2>Stats Overview</h2>
    <p>Username: <span id="username">Player123</span></p>
    <p>Score: <span id="score">0</span></p>
    <p>Kills: <span id="kills">0</span></p>
    <p>Deaths: <span id="deaths">0</span></p>
    <p>K/D Ratio: <span id="kd">0</span></p>
    <p>Matches Played: <span id="matches">0</span></p>
    <p>Wins: <span id="wins">0</span></p>
    <p>Losses: <span id="losses">0</span></p>
    <p>Top Weapon: <span id="topWeapon">None</span></p>
    <p>Favorite Weapon: <span id="favWeapon">None</span></p>
    <p>Favorite Map: <span id="favoriteMap">None</span></p>
    <p>Extraction Rate: <span id="extraction">0%</span></p>
    <p>Longest Streak: <span id="streak">0</span></p>
    <p>Total Time Played: <span id="timePlayed">0h</span></p>
  </div>
</div>

<div class="footer">
  Not affiliated with Bungie.
</div>

<script src="app.js"></script>
<script>
// Example: dynamically fill stats from user search
function displayPlayerStats(playerData) {
  document.getElementById('playerNameTitle').textContent = playerData.username;
  document.getElementById('username').textContent = playerData.username;
  document.getElementById('score').textContent = playerData.score;
  document.getElementById('kills').textContent = playerData.kills;
  document.getElementById('deaths').textContent = playerData.deaths;
  document.getElementById('kd').textContent = (playerData.kills / Math.max(playerData.deaths,1)).toFixed(2);
  document.getElementById('matches').textContent = playerData.matches;
  document.getElementById('wins').textContent = playerData.wins;
  document.getElementById('losses').textContent = playerData.losses;
  document.getElementById('topWeapon').textContent = playerData.topWeapon;
  document.getElementById('favWeapon').textContent = playerData.favoriteWeapon;
  document.getElementById('favoriteMap').textContent = playerData.favoriteMap;
  document.getElementById('extraction').textContent = playerData.extractionRate + '%';
  document.getElementById('streak').textContent = playerData.longestStreak;
  document.getElementById('timePlayed').textContent = playerData.totalTimePlayed + 'h';
}

// Example dummy data
displayPlayerStats({
  username: "Runner123",
  score: 15200,
  kills: 256,
  deaths: 120,
  matches: 45,
  wins: 20,
  losses: 25,
  topWeapon: "Bolt Rifle",
  favoriteWeapon: "Laser Rifle",
  favoriteMap: "Perimeter",
  extractionRate: 78,
  longestStreak: 12,
  totalTimePlayed: 85
});
</script>

</body>
</html>
